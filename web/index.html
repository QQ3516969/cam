<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>3D 打印监控面板</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #151922;
      --panel-border: #2b3342;
      --btn: #2a3140;
      --btn-border: #3b4558;
      --btn-text: #eef2ff;
      --ok: #2ea55f;
      --ok-border: #46bf79;
      --shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body { margin:0; background: #0f131a; color:#f2f5ff; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif; }
    .wrap { max-width:980px; margin:0 auto; padding:10px; padding-bottom:64px; }
    .card { background:var(--panel); border:1px solid var(--panel-border); border-radius:14px; padding:8px; margin-bottom:8px; }
    .video-card { overflow:hidden; }
    .video-shell { position:relative; width:100%; max-width:100%; box-sizing:border-box; border-radius:14px; overflow:hidden; background:#000; border:1px solid #2b3342; aspect-ratio:16/9; min-height:220px; isolation:isolate; -webkit-transform:translateZ(0); transform:translateZ(0); }
    video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; background:#000; -webkit-user-select:none; user-select:none; touch-action:manipulation; border-radius:inherit; clip-path:inset(0 round 14px); }
    .webrtc-frame { position:absolute; inset:0; width:100%; height:100%; border:0; background:#000; display:none; z-index:25; pointer-events:none; border-radius:inherit; clip-path:inset(0 round 14px); }
    video::-webkit-media-controls { display:none !important; }
    video::-webkit-media-controls-enclosure { display:none !important; }
    .live-badge { position:absolute; right:8px; bottom:8px; height:20px; line-height:20px; padding:0 7px; border-radius:999px; font-size:10px; color:#fff; background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.20); letter-spacing:0.2px; z-index:30; display:flex; align-items:center; gap:5px; }
    #liveText { display:none; }
    .live-dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
    .live-ok { background:#2ecc71; box-shadow:0 0 0 2px rgba(46,204,113,0.2); }
    .live-warn { background:#f1c40f; box-shadow:0 0 0 2px rgba(241,196,15,0.2); }
    .live-bad { background:#ff4d4f; box-shadow:0 0 0 2px rgba(255,77,79,0.2); }
    .video-toolbar { position:absolute; top:8px; right:8px; z-index:31; display:flex; gap:6px; }
    .apple-btn { border:1px solid var(--btn-border); background:var(--btn); color:var(--btn-text); border-radius:10px; transition: background-color .08s ease, border-color .08s ease; font-weight:600; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
    .apple-btn:active { transform:none; background: #3a475e; border-color:#567099; }
    .tiny { height:28px; padding:0 8px; font-size:11px; border-radius:9px; }
    .rotate-btn { display:none !important; }
    .pad-toggle-btn { display:none; min-width:88px; padding:0 12px; }
    .status { min-height:18px; margin-top:8px; font-size:12px; color:#a7c5ff; letter-spacing:.1px; }
    .video-status { min-height:0; margin-top:0; }
    .controls-layout { display:grid; grid-template-columns:1.1fr 0.9fr; gap:8px; align-items:start; }
    .dpad { display:grid; grid-template-columns:repeat(3, 1fr); grid-template-rows:repeat(3, 38px); gap:6px; }
    .blank { opacity:0; pointer-events:none; }
    .ctl-btn { height:38px; font-size:13px; border-radius:10px; }
    .preset-btn { opacity:.68; background:#242c3a; border-color:#35425a; color:#c7d3ea; font-weight:500; }
    .preset-btn:active { opacity:.92; }
    .preset-btn.is-active { opacity:1; background:linear-gradient(180deg, #f3e7a6, #dccb7a); border-color:#f6e7a8; color:#3a3320; box-shadow:0 0 0 1px rgba(255,245,186,0.45) inset; }
    .btn-active { opacity:1 !important; background: linear-gradient(180deg, #f3e7a6, #dccb7a) !important; border-color:#f6e7a8 !important; color:#3a3320 !important; box-shadow:0 0 0 1px rgba(255,245,186,0.45) inset !important; }
    .ok-btn { background:var(--ok); border-color:var(--ok-border); color:#f8fffb; font-weight:700; }
    .dir-btn { background:linear-gradient(180deg, #2a313d, #222936); border-color:#3a4252; color:#d7deeb; }
    .dir-btn:active { background:#343d4b; border-color:#4d5a70; color:#eef2fa; }
    .joy-up, .joy-down, .joy-left, .joy-right { background:#2b5fd9; border-color:#4b7df2; }
    .joy-up:active, .joy-down:active, .joy-left:active, .joy-right:active { background:#4a79ea; border-color:#7aa0ff; }
    .ctl-btn:active { transform:none; background: linear-gradient(180deg, rgba(96,132,190,0.95), rgba(74,106,165,0.95)); border-color: rgba(194,222,255,0.58); color:#ffffff; }
    .ctl-btn.dir-btn:active { background:#343d4b; border-color:#4d5a70; color:#eef2fa; }
    .ok-btn:active { transform:none; background: linear-gradient(180deg, #2fbe66, #269d55); border-color: rgba(132,255,178,0.68); color:#ffffff; }
    .joy-center:active { transform: translate(-50%,-50%) !important; background:#259653; border-color:#46bf79; }
    .func-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; }
    .fs-overlay { position:absolute; inset:0; display:none; z-index:40; padding:8px; pointer-events:none; overflow:hidden; }
    .fs-overlay.show { display:none; }
    .rotate-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9998; display:none; }
    .rotate-backdrop.show { display:block; }
    .joy-wrap { position:absolute; left:50%; top:50%; bottom:auto; width:min(294px, 63vw); margin:0; pointer-events:auto; touch-action:none; }
    .joy-stack { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .joystick { position:relative; width:min(133px, 32vw); height:min(133px, 32vw); margin:0 auto; border-radius:50%; background:#1a202b; border:1px solid #3a4558; }
    .joy-btn { position:absolute; width:32px; height:32px; border-radius:50%; font-size:11px; border:1px solid #4a556b; background:#232b39; color:#fff; display:flex; align-items:center; justify-content:center; touch-action:manipulation; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
    .joy-btn:active { background:#415273; border-color:#6f87b8; }
    .joy-up { left:50%; top:10px; transform:translateX(-50%); }
    .joy-down { left:50%; bottom:10px; transform:translateX(-50%); }
    .joy-left { left:10px; top:50%; transform:translateY(-50%); }
    .joy-right { right:10px; top:50%; transform:translateY(-50%); }
    .joy-center { left:50%; top:50%; transform:translate(-50%,-50%); width:40px; height:40px; background:var(--ok); border-color:var(--ok-border); font-weight:700; margin:0; }
    .joy-zoom-plus { left:28px; bottom:15px; transform:none; width:22px; height:16px; border-radius:8px; font-size:9px; }
    .joy-zoom-minus { right:28px; bottom:15px; transform:none; width:22px; height:16px; border-radius:8px; font-size:9px; }
            .digital-status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 8px 16px;
      background: #0a0a0a;
      border-top: 1px solid #1a1a1a;
    }
    .digital-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #333;
    }
    .digital-dot.live-ok { background: #00ff00; box-shadow: 0 0 8px #00ff00, 0 0 12px #00ff0060; }
    .digital-dot.live-bad { background: #ff3b2f; box-shadow: 0 0 8px #ff3b2f, 0 0 12px #ff3b2f60; }
    .digital-time {
      font-family: 'Share Tech Mono', 'SF Mono', Consolas, monospace;
      font-size: 14px;
      color: #00ccff;
      text-shadow: 0 0 8px #00ccff, 0 0 16px #00ccff60;
      letter-spacing: 2px;
    }
    .digital-latency {
      font-family: 'Share Tech Mono', 'SF Mono', Consolas, monospace;
      font-size: 14px;
      color: #2ecc71;
      text-shadow: 0 0 8px #2ecc71, 0 0 16px #2ecc7160;
      min-width: 80px;
      letter-spacing: 2px;
    }

  .stream-bar { display:none !important; }
    .stream-bar select { height:30px; border-radius:8px; border:1px solid #3b4558; background:#111722; color:#dde7ff; padding:0 7px; font-size:10px; }
    .stream-bar button { height:30px; font-size:10px; padding:0 8px; border-radius:8px; }
    .debug-row { display:flex; gap:6px; margin-top:8px; }
    .debug-toggle { height:28px; padding:0 10px; font-size:11px; border-radius:8px; }
    .debug-panel { margin-top:8px; border:1px solid #2f394b; border-radius:10px; background:#0f1420; padding:6px; max-height:180px; overflow:auto; }
    .debug-panel.hide { display:none; }
    .debug-log { margin:0; white-space:pre-wrap; word-break:break-word; font-size:11px; line-height:1.35; color:#cfe2ff; }
    .start-btn { display:none !important; }
    .video-shell:fullscreen .fs-overlay.show, .video-shell:-webkit-full-screen .fs-overlay.show { display:block; }
    .video-shell:fullscreen, .video-shell:-webkit-full-screen { width:100vw; height:100vh; border-radius:0; border:none; }
    .video-shell:fullscreen video, .video-shell:-webkit-full-screen video { width:100%; height:100%; object-fit:cover; }
    .video-shell:fullscreen .video-toolbar, .video-shell:-webkit-full-screen .video-toolbar { display:flex; }
    .video-shell:fullscreen .pad-toggle-btn, .video-shell:-webkit-full-screen .pad-toggle-btn { display:inline-flex; }
    .video-shell:fullscreen .fs-overlay.show, .video-shell:-webkit-full-screen .fs-overlay.show { opacity:0.5; }
    .video-shell:fullscreen .joystick,
    .video-shell:-webkit-full-screen .joystick {
      width: 160px;
      height: 160px;
    }
    .video-shell:fullscreen .joy-zoom-plus,
    .video-shell:-webkit-full-screen .joy-zoom-plus {
      left: 22px;
      bottom: 24px;
      transform: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 11px;
    }
    .video-shell:fullscreen .joy-zoom-minus,
    .video-shell:-webkit-full-screen .joy-zoom-minus {
      right: 22px;
      bottom: 24px;
      transform: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 11px;
    }
    body.rotate-fullscreen { overflow:hidden; }
    .video-shell.manual-landscape {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vh;
      height: 100vw;
      max-width: none;
      min-height: 0;
      aspect-ratio: auto;
      border-radius: 0;
      border: none;
      z-index: 9999;
      transform: translate(-50%, -50%) rotate(90deg);
      transform-origin: center center;
    }
    .video-shell.manual-landscape video,
    .video-shell.manual-landscape .webrtc-frame {
      border-radius: 0;
      clip-path: none;
      object-fit: cover;
    }
    .video-shell.manual-landscape .pad-toggle-btn { display:inline-flex; }
    .video-shell.manual-landscape .fs-overlay.show { opacity:0.5; }
    .video-shell.manual-landscape .fs-overlay.show { display:block; }
    .video-shell.manual-landscape .joystick {
      width: 160px;
      height: 160px;
    }
    .video-shell.manual-landscape .joy-wrap {
      width: max-content;
    }
    .video-shell.manual-landscape .video-toolbar {
      top: 14px;
      right: 14px;
    }
    .video-shell.fullscreen-active .latency-row {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      z-index: 41;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 8px 12px;
      margin: 0;
      border-radius: 12px;
      background: rgba(7, 11, 19, 0.46);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .video-shell.fullscreen-active .digital-time,
    .video-shell.fullscreen-active .digital-latency {
      letter-spacing: 1px;
    }
    .video-shell.manual-landscape .pad-toggle-btn {
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .video-shell:fullscreen .pad-toggle-btn,
    .video-shell:-webkit-full-screen .pad-toggle-btn,
    .video-shell.manual-landscape .pad-toggle-btn {
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .video-shell.manual-landscape .joy-zoom-plus {
      left: 22px;
      bottom: 24px;
      transform: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 11px;
    }
    .video-shell.manual-landscape .joy-zoom-minus {
      right: 22px;
      bottom: 24px;
      transform: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 11px;
    }
    @media (max-width:760px) {
      .video-shell.manual-landscape .joy-wrap {
        width: max-content;
      }
      .video-shell.manual-landscape .joystick {
        width: 140px;
        height: 140px;
      }
    }
    /* Landscape mobile: fullscreen video */
    @media (orientation: landscape) and (max-height: 500px) {
      .wrap { max-width: 100% !important; padding: 4px !important; }
      .card.video-card { margin-bottom: 4px !important; padding: 4px !important; }
      .video-shell { min-height: 100vh !important; aspect-ratio: unset !important; border-radius: 0 !important; }
      .controls-layout { grid-template-columns:1fr; }
      .control-panel:first-child { display: none; }
    }
    @media (max-width:760px) {
      .controls-layout { grid-template-columns:1fr; }
      .ctl-btn { height:34px; font-size:12px; }
      .dpad { grid-template-rows:repeat(3, 34px); gap:5px; }
      .func-grid { gap:6px; }
      .joy-wrap { width:min(238px, 64vw); margin-top: 10px; }
      .joystick { width:min(115px, 31vw); height:min(115px, 31vw); }
      .joy-btn { width:28px; height:28px; font-size:10px; }
      .joy-center { width:35px; height:35px; font-size:10px; }
      .joy-zoom-plus, .joy-zoom-minus { width:20px; height:14px; font-size:8px; bottom:14px; }
      .video-shell { aspect-ratio:16/9; min-height:220px; }
      .card.video-card { margin:0; padding:0; background:transparent; border:none; box-shadow:none; }
      .latency-row { display:flex; align-items:center; justify-content:center; gap:16px; padding:8px 0; }
    }
    @media (max-width:500px) {
      .video-shell { border-radius:0; min-height:auto; }
      .video-shell video { border-radius:0; }
    }
  
    /* ===== WeChat-perfect UI skin ===== */
    body {
      background: radial-gradient(120% 120% at 10% 0%, #0f1f3c 0%, #0a1327 48%, #070d1c 100%);
      color: #e8f0ff;
    }
    .wrap { max-width: 500px; padding: 10px 12px 70px; }
    .card {
      background: linear-gradient(180deg, rgba(22,36,66,0.9), rgba(11,21,43,0.92));
      border: 1px solid rgba(99,129,188,0.35);
      border-radius: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 10px 24px rgba(0,0,0,0.34);
      padding: 10px;
      margin-bottom: 12px;
    }
    .video-shell {
      border-radius: 16px;
      border: 1px solid rgba(101,130,188,0.35);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      min-height: 210px;
    }
    .video-status {
      color: #8ea6d9;
      font-size: 14px;
      min-height: 22px;
      text-align: center;
    }
    .live-badge {
      background: rgba(0,0,0,0.62);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 0 10px;
      height: 22px;
      line-height: 22px;
      font-size: 14px;
      right: 10px;

    }
    .live-dot { width: 10px; height: 10px; }
    .controls-layout { display: block; }

      border: 1px solid rgba(105,136,197,0.35);

    .panel-title {

      margin: 0 0 10px;
    }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 4px;
    }
    .preset-grid .apple-btn,
    .home-row .apple-btn {
      min-height: 30px;
      border-radius: 13px;
      background: linear-gradient(180deg, #26334d, #1e2a40);
      border: 1px solid #3d5581;

    }
    .preset-slot-btn {
      min-height: 48px;

      justify-content: center;
      gap: 2px;
    }
    .preset-slot-btn .preset-num {

    }
    .preset-slot-btn .preset-note {

    .preset-slot-btn.is-active .preset-note,
    .btn-active .preset-note {
      color: rgba(58,51,32,0.82);
    }
    .preset-edit-modal {
      position: fixed;
      inset: 0;
      z-index: 12000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;

    }
    .preset-edit-modal.show { display: flex; }

      width: min(92vw, 360px);

    .home-row { margin-top: 8px; }
    .home-row .apple-btn { width: 100%; }

      display: flex;

        .vision-pad {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 4px;
      max-width: 180px;
      margin: 4px auto;
    }
    .vw-btn {
      width: 100%;
      height: 20px;
      border-radius: 10px;

      background: linear-gradient(180deg, #3a6ee3, #2d5fd1);
      color: #eaf1ff;
      font-size: 16px;
      font-weight: 700;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .pad-gap { visibility: hidden; }

    .slot-code {
      margin-top: 8px;
      border-radius: 10px;
      border: 1px dashed rgba(117,151,218,0.48);
      background: rgba(9,16,31,0.62);

      font-size: 12px;

    }
    .debug-row, .debug-panel { display: none !important; }

  
    .latency-dock {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: 10px auto 0;
      border-radius: 10px;
      border: 1px solid #2e2e2e;
      background: linear-gradient(180deg, #1b1b1b 0%, #0d0d0d 100%);
      box-shadow: 0 4px 14px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.05);
      padding: 6px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

  <script>
    const statusEl = document.getElementById('status');
    const videoStatusEl = document.getElementById('videoStatus');

    const videoShell = document.getElementById('videoShell');
    const padOverlay = document.getElementById('padOverlay');
    const rotateBackdrop = document.getElementById('rotateBackdrop');

    const latencyRow = document.querySelector('.latency-row');

    const liveText = document.getElementById('liveText');
    const latencyText = document.getElementById('latencyText');
    const latencyDigital = document.getElementById('latencyDigital');
    const webrtcFrame = document.getElementById('webrtcFrame');
    const debugPanel = document.getElementById('debugPanel');
    const debugLog = document.getElementById('debugLog');
    const debugToggleBtn = document.getElementById('debugToggleBtn');
    const startBtn = document.getElementById('startBtn');
    const IS_WECHAT = /MicroMessenger/i.test(navigator.userAgent || '');
    const IS_IOS = /iP(hone|od|ad)/i.test(navigator.userAgent || '');

    let hlsInstance = null;
    let padVisible = false;
    const FIXED_WEBRTC_URL = 'http://ddns.c6666.com:8889/cam/?controls=0&muted=1&autoplay=1&playsinline=1';
    const FIXED_HLS_URL = 'http://ddns.c6666.com:8888/cam/index.m3u8';
    const FIXED_STREAM_URL = FIXED_WEBRTC_URL;
    let currentStreamUrl = FIXED_STREAM_URL;
    let ignoreClickUntil = 0;
    let autoStartRetries = 0;
    const MAX_AUTOSTART_RETRIES = 30;
    let streamHealthTimer = null;
    let playbackGuardTimer = null;
    let lastVideoTime = -1;
    let stillCount = 0;
    let noSourceReloadCount = 0;
    let debugVisible = false;
    let webrtcReader = null;
    let webrtcRetryTimer = null;
    let webrtcRetryCount = 0;
    let webrtcUserActivated = false;
    let webrtcHasTrack = false;
    let webrtcStartInProgress = false;
    let webrtcStartWatchdog = null;
    let webrtcEnsureTimer = null;
    let manualFullscreen = false;
    const latencyRowOriginalParent = latencyRow ? latencyRow.parentNode : null;
    const latencyRowOriginalNextSibling = latencyRow ? latencyRow.nextSibling : null;
    const UI_STATE_POLL_MS = 3000;
    const PRESET_LABEL_HOLD_MS = 1000;
    const PRESET_LABEL_SUPPRESS_CLICK_MS = 500;
    let presetLabelHoldKey = '';
    let presetLabelHoldTimer = null;
    let presetLabelSuppressClickUntil = 0;
    let presetLabelPointerId = null;
    let uiStateSyncTimer = null;
    let uiStateFetchInFlight = false;
    let uiState = { active_preset: '', preset_labels: {} };
    let presetEditResolver = null;


    function setVideoStatus(text) {
      if (!videoStatusEl) return;
      const v = (text || '').trim();
      videoStatusEl.textContent = v;
      videoStatusEl.style.display = v ? 'block' : 'none';
    }

    function t(s){
      const map = {
        noStream: '\u672A\u9009\u62E9\u89C6\u9891\u6D41',
        cannotEmbed: '',
        loadedNative: '\u5DF2\u52A0\u8F7D\uFF08\u539F\u751FHLS\uFF09',
        loadedHlsJs: '\u5DF2\u52A0\u8F7D\uFF08hls.js\uFF09',
        videoErr: '\u89C6\u9891\u9519\u8BEF\uFF1A',
        hlsUnsupported: '\u5F53\u524D\u6D4F\u89C8\u5668\u4E0D\u652F\u6301HLS',
        sending: '\u53D1\u9001\u4E2D\uFF1A',
        success: '\u6210\u529F\uFF1A',
        failed: '\u5931\u8D25\uFF1A',
        error: '\u9519\u8BEF\uFF1A',
        missCfg: '\u63A7\u5236\u63A5\u53E3\u672A\u914D\u7F6E\uFF1A\u8BF7\u586B\u5199TUYA_CLIENT_ID / TUYA_CLIENT_SECRET / TUYA_DEVICE_ID / TUYA_REMOTE_ID',
        pad: '\u6447\u6746',
        hidePad: '\u9690\u85CF\u6447\u6746'
      };
      return map[s] || s;
    }

    function isHlsPlayableUrl(url) { return url.endsWith('.m3u8') || url.includes(':8888/cam/'); }
    function isWebRtcPlayableUrl(url) {
      const u = String(url || '');
      return (u.includes(':8889/cam/') || u.startsWith('/cam/?') || u.startsWith('/cam/whep')) && !u.includes('.m3u8');
    }
    function normalizeToM3u8(url) {
      if (url.endsWith('.m3u8')) return url;
      if (url.includes(':8888/cam/')) return 'http://ddns.c6666.com:8888/cam/index.m3u8';
      return url;
    }
    function normalizeToWebRtcPage(url) {
      if (!isWebRtcPlayableUrl(url)) return url;
      const base = url.split('?')[0].replace(/\/$/, '') + '/';
      return base + '?controls=0&muted=1&autoplay=1&playsinline=1';
    }
    function isCurrentWebRtcMode() {
      return isWebRtcPlayableUrl(currentStreamUrl || '');
    }

    function stopWebRtcReader() {
      if (webrtcRetryTimer) {
        clearTimeout(webrtcRetryTimer);
        webrtcRetryTimer = null;
      }
      if (webrtcStartWatchdog) {
        clearTimeout(webrtcStartWatchdog);
        webrtcStartWatchdog = null;
      }
      webrtcStartInProgress = false;
      if (webrtcReader) {
        try { webrtcReader.close(); } catch (_) {}
        webrtcReader = null;
      }
    }

    function scheduleWebRtcRetry() {
      if (!isCurrentWebRtcMode()) return;
      if (webrtcRetryTimer) return;
      const delay = webrtcUserActivated ? 900 : Math.min(8000, 1200 + webrtcRetryCount * 800);
      webrtcRetryCount += 1;
      appendDebug(`[webrtc] retry in ${delay}ms (#${webrtcRetryCount})`);
      webrtcRetryTimer = setTimeout(() => {
        webrtcRetryTimer = null;
        startWebRtcReader();
      }, delay);
    }

    function startWebRtcReader() {
      if (!isCurrentWebRtcMode()) return;
      if (webrtcStartInProgress) return;

      stopWebRtcReader();
      webrtcStartInProgress = true;
      webrtcHasTrack = false;

      const video = document.getElementById('v');
      if (!video) { webrtcStartInProgress = false; return; }

      video.muted = true;
      video.autoplay = true;
      video.playsInline = true;

      const whep = `${window.location.origin}/cam/whep`;
      try {
        webrtcReader = new MediaMTXWebRTCReader({
          url: whep,
          onError: (err) => {
            webrtcStartInProgress = false;
            appendDebug(`[webrtc] error: ${err}`);
            setLiveState('bad', '重连中');
            if (latencyText) latencyText.textContent = '--ms';
        if (digitalDot) digitalDot.className = 'digital-dot live-bad';
        if (digitalLatency) digitalLatency.textContent = '----ms';
        if (digitalTime) digitalTime.textContent = '--:--:--';
      if (latencyDigital) latencyDigital.textContent = '--.--';
            scheduleWebRtcRetry();
          },
          onTrack: (evt) => {
            webrtcStartInProgress = false;
            webrtcHasTrack = true;
            webrtcRetryCount = 0;
            video.srcObject = evt.streams[0];
            const playPromise = video.play();
            if (playPromise && typeof playPromise.catch === 'function') {
              playPromise.then(() => {
                              }).catch(() => {
                              });
            }
            setLiveState('ok', 'WebRTC');
            setVideoStatus('');
          },
        });

        webrtcStartWatchdog = setTimeout(() => {
          webrtcStartWatchdog = null;
          if (!webrtcHasTrack && isCurrentWebRtcMode()) {
            webrtcStartInProgress = false;
            appendDebug('[webrtc] watchdog timeout, restart');
            try { if (webrtcReader) webrtcReader.close(); } catch (_) {}
            webrtcReader = null;
            scheduleWebRtcRetry();
          }
        }, webrtcUserActivated ? 2600 : 4200);
      } catch (e) {
        webrtcStartInProgress = false;
        appendDebug(`[webrtc] init fail: ${e?.message || e}`);
        scheduleWebRtcRetry();
      }
    }

    function keepPlaying(video) {
      video.addEventListener('pause', () => { if (!video.ended) tryPlay(video); });
    }

    function tryPlay(video, fromAuto = false) {
      const p = video.play();
      if (p && typeof p.catch === 'function') {
        p.catch(() => {
          if (fromAuto) {
          }
        });
      }
    }

    function getDefaultPlayableStream() {
      return FIXED_STREAM_URL;
    }

    function syncPresetToCurrent(url) {
      const opts = Array.from(streamPreset.options || []);
      const hit = opts.find(o => normalizeToM3u8(o.value) === url || normalizeToWebRtcPage(o.value) === url);
      if (hit) streamPreset.value = hit.value;
    }

    async function probeLatencyMs() {
      const t0 = performance.now();
      const probeUrl = isCurrentWebRtcMode() ? `${window.location.origin}/cam/` : 'http://ddns.c6666.com:8888/cam/index.m3u8';
      try {
        await fetch(probeUrl, { mode: 'no-cors', cache: 'no-store' });
        return Math.round(performance.now() - t0);
      } catch (_) {
        return -1;
      }
    }


    function syncLatencyDigitalFromBadge() {
      if (!latencyDigital || !latencyText) return;
      const raw = (latencyText.textContent || '').trim();
      const m = raw.match(/(\d+(?:\.\d+)?)/);
      latencyDigital.textContent = m ? m[1] : '--.--';
    }

function updateDigitalStatus(ms) {
  if (!digitalDot || !digitalTime || !digitalLatency) return;
  if (ms >= 0) {
    digitalDot.className = 'digital-dot live-ok';
    digitalLatency.textContent = String(ms).padStart(4, ' ') + 'ms';
  } else {
    digitalDot.className = 'digital-dot live-bad';
    digitalLatency.textContent = '----ms';
  }
  var d = new Date();
  var h = String(d.getHours()).padStart(2, '0');
  var m = String(d.getMinutes()).padStart(2, '0');
  var s = String(d.getSeconds()).padStart(2, '0');
  digitalTime.textContent = h + ':' + m + ':' + s;
}

    function startLatencyProbe() {
      const tick = async () => {
        const ms = await probeLatencyMs();
        if (latencyText) latencyText.textContent = (digitalDot && digitalDot.classList.contains('live-ok') && ms >= 0) ? `${ms}ms` : '--ms';
        if (latencyDigital) latencyDigital.textContent = (ms >= 0) ? `${ms}` : '--.--';
        syncLatencyDigitalFromBadge();
        updateDigitalStatus(ms);
      };
      tick();
      setInterval(tick, 3000);
    }

    function autoStartVideo() {
      currentStreamUrl = getDefaultPlayableStream();
      syncPresetToCurrent(currentStreamUrl);
      autoStartRetries = 0;
      loadVideo(currentStreamUrl);

      const video = document.getElementById('v');
      const timer = setInterval(() => {
        autoStartRetries += 1;
        if (isCurrentWebRtcMode()) {
          clearInterval(timer);
          return;
        }
        const playing = video.readyState >= 2 && !video.paused;
        if (playing) {
          clearInterval(timer);
          return;
        }
        if (autoStartRetries >= MAX_AUTOSTART_RETRIES) {
          clearInterval(timer);
          if (video.paused) {
            setVideoStatus('自动起播耗时较长，仍在后台保活重试');
          }
          return;
        }
        loadVideo(currentStreamUrl);
      }, 1500);
    }

    function setLiveState(level, text) {
      if (liveText) liveText.textContent = text;
      digitalDot.classList.remove('live-ok', 'live-warn', 'live-bad');
      if (level === 'ok') digitalDot.classList.add('live-ok');
      else if (level === 'warn') digitalDot.classList.add('live-warn');
      else digitalDot.classList.add('live-bad');
    }

    function startStreamHealthMonitor() {
      const video = document.getElementById('v');
      if (streamHealthTimer) clearInterval(streamHealthTimer);
      lastVideoTime = -1;
      stillCount = 0;
      setLiveState('bad', '检测中');
      if (latencyText) latencyText.textContent = '--ms';
        if (digitalDot) digitalDot.className = 'digital-dot live-bad';
        if (digitalLatency) digitalLatency.textContent = '----ms';
        if (digitalTime) digitalTime.textContent = '--:--:--';
      if (latencyDigital) latencyDigital.textContent = '--.--';

      streamHealthTimer = setInterval(() => {
        if (isCurrentWebRtcMode()) {
          setLiveState('ok', 'WebRTC');
          return;
        }
        if (!video.src && !video.currentSrc) {
          setLiveState('bad', '未加载');
          return;
        }
        if (video.readyState < 2) {
          setLiveState('bad', '缓冲中');
          return;
        }

        const t = Number(video.currentTime || 0);
        if (lastVideoTime < 0) {
          lastVideoTime = t;
          setLiveState('warn', '预热中');
          return;
        }

        const dt = t - lastVideoTime;
        lastVideoTime = t;

        if (dt > 0.02) {
          stillCount = 0;
          setLiveState('ok', '实时');
          return;
        }

        stillCount += 1;
        if (stillCount >= 6) {
          setLiveState('warn', '疑似静止');
        }
      }, 1000);
    }

    function startPlaybackGuard() {
      const video = document.getElementById('v');
      if (playbackGuardTimer) clearInterval(playbackGuardTimer);

      playbackGuardTimer = setInterval(() => {
        if (isCurrentWebRtcMode()) {
          const v = document.getElementById('v');
          if (v && v.paused) {
            const p = v.play();
            if (p && typeof p.catch === 'function') {
              p.catch(() => {});
            }
          }
          if (!webrtcHasTrack && webrtcUserActivated) {
            scheduleWebRtcRetry();
          }
          return;
        }
        const noSource = !video.currentSrc && !video.src;
        const stalled = video.readyState < 2 || video.paused;

        if (noSource) {
          noSourceReloadCount += 1;
          if (noSourceReloadCount >= 3) {
            if (!currentStreamUrl) {
              currentStreamUrl = getDefaultPlayableStream();
              syncPresetToCurrent(currentStreamUrl);
            }
            loadVideo(currentStreamUrl);
            noSourceReloadCount = 0;
          }
          return;
        }

        noSourceReloadCount = 0;

        if (stalled) {
          tryPlay(video, true);
          return;
        }

        const t = Number(video.currentTime || 0);
        if (lastVideoTime >= 0 && (t - lastVideoTime) <= 0.001) {
          tryPlay(video, true);
        }
      }, 3000);
    }

    function loadVideo(url) {
      const video = document.getElementById('v');
      keepPlaying(video);
      const target = url || currentStreamUrl;
      if (!target) { setVideoStatus(t('noStream')); return; }

      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      video.pause();
      video.removeAttribute('src');
      video.load();

      if (isWebRtcPlayableUrl(target)) {
        currentStreamUrl = FIXED_WEBRTC_URL;
        webrtcHasTrack = false;
        if (webrtcFrame) {
          webrtcFrame.style.display = 'none';
          webrtcFrame.style.pointerEvents = 'none';
          webrtcFrame.src = 'about:blank';
        }
        video.style.display = 'block';
        setVideoStatus('正在连接 WebRTC...');
        startWebRtcReader();
        return;
      }

      stopWebRtcReader();
      if (webrtcFrame) {
        webrtcFrame.style.display = 'none';
        webrtcFrame.style.pointerEvents = 'none';
        webrtcFrame.src = 'about:blank';
      }
            video.style.display = 'block';

      if (!isHlsPlayableUrl(target)) {
        setVideoStatus('');
        return;
      }

      const playUrl = normalizeToM3u8(target);
      currentStreamUrl = playUrl;

      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = playUrl;
        tryPlay(video, true);
        setVideoStatus(t('loadedNative'));
        return;
      }

      if (window.Hls && Hls.isSupported()) {
        hlsInstance = new Hls({ lowLatencyMode: true });
        hlsInstance.loadSource(playUrl);
        hlsInstance.attachMedia(video);

    const ZOOM_HOLD_KEYS = new Set(['zoom+', 'zoom-', 'up', 'down', 'left', 'right']);
    const ZOOM_HOLD_START_DELAY_MS = 120;
    const ZOOM_HOLD_REPEAT_MS = 100;
    const ZOOM_HOLD_SUPPRESS_CLICK_MS = 220;
    let zoomHoldKey = '';
    let zoomHoldStartTimer = null;
    let zoomHoldRepeatTimer = null;
    let zoomHoldPointerId = null;
    let zoomHoldSuppressClickUntil = 0;
    let joystickDragPointerId = null;
    let joystickDragStartX = 0;
    let joystickDragStartY = 0;
    let joystickStartLeft = 0;
    let joystickStartTop = 0;

    function clearZoomHoldTimers() {
      if (zoomHoldStartTimer) {
        clearTimeout(zoomHoldStartTimer);
        zoomHoldStartTimer = null;

      if (zoomHoldRepeatTimer) {

    async function sendZoomHoldTick(key) {

    function startZoomHold(ev, key) {
      if (!ZOOM_HOLD_KEYS.has(key)) return;
      if (ev.pointerType === 'mouse' && ev.button !== 0) return;

      ev.preventDefault();
      zoomHoldSuppressClickUntil = Date.now() + ZOOM_HOLD_SUPPRESS_CLICK_MS;
      stopZoomHold();

      zoomHoldKey = key;
      zoomHoldPointerId = (ev.pointerId === undefined ? null : ev.pointerId);
      statusEl.textContent = t('sending') + key + '...';

      const target = ev.currentTarget;
      if (target && typeof target.setPointerCapture === 'function' && zoomHoldPointerId !== null) {
        try { target.setPointerCapture(zoomHoldPointerId); } catch (_) {}
      }

      sendZoomHoldTick(key);
      zoomHoldStartTimer = setTimeout(() => {
        if (zoomHoldKey !== key) return;
        zoomHoldRepeatTimer = setInterval(() => {
          if (zoomHoldKey !== key) return;
          sendZoomHoldTick(key);

    function getDefaultJoystickPosition() {
      const joyWrap = padOverlay.querySelector('.joy-wrap');
      if (!joyWrap) return { left: 0, top: 0 };
      const overlayWidth = padOverlay.clientWidth || 0;
      const overlayHeight = padOverlay.clientHeight || 0;
      const wrapWidth = joyWrap.offsetWidth || 0;
      const wrapHeight = joyWrap.offsetHeight || 0;
      const margin = 16;
      if (manualFullscreen) {
        return clampJoystickPosition(
          overlayWidth - wrapWidth - margin,
          overlayHeight - wrapHeight - margin
        );
      }
      if (isFullscreen()) {
        return clampJoystickPosition(
          overlayWidth - wrapWidth - margin,
          overlayHeight - wrapHeight - margin
        );
      }
      return clampJoystickPosition(
        Math.max(0, (overlayWidth - wrapWidth) / 2),
        Math.max(0, (overlayHeight - wrapHeight) / 2)
      );
    }

    function resetJoystickPosition() {
      const joyWrap = padOverlay.querySelector('.joy-wrap');
      if (!joyWrap) return;
      const pos = getDefaultJoystickPosition();
      const left = pos.left || 0;
      const top = pos.top || 0;
      joyWrap.style.left = `${left}px`;
      joyWrap.style.top = `${top}px`;
      joyWrap.style.bottom = 'auto';
    }

    function clampJoystickPosition(left, top) {
      const joyWrap = padOverlay.querySelector('.joy-wrap');
      if (!joyWrap) return { left: 0, top: 0 };
      const overlayWidth = padOverlay.clientWidth || 0;
      const overlayHeight = padOverlay.clientHeight || 0;
      const wrapWidth = joyWrap.offsetWidth || 0;
      const wrapHeight = joyWrap.offsetHeight || 0;
      return {
        left: Math.min(Math.max(0, left), Math.max(0, overlayWidth - wrapWidth)),
        top: Math.min(Math.max(0, top), Math.max(0, overlayHeight - wrapHeight)),
      };
    }

    function applyJoystickPosition(left, top) {
      const joyWrap = padOverlay.querySelector('.joy-wrap');
      if (!joyWrap) return;
      const pos = clampJoystickPosition(left, top);
      joyWrap.style.left = `${pos.left}px`;
      joyWrap.style.top = `${pos.top}px`;
      joyWrap.style.bottom = 'auto';
    }

    function startJoystickDrag(ev) {
      if (!padVisible) return;
      const target = ev.currentTarget;
      const joyWrap = padOverlay.querySelector('.joy-wrap');
      if (!joyWrap) return;
      const left = joyWrap.offsetLeft || 0;
      const top = joyWrap.offsetTop || 0;
      joystickDragPointerId = ev.pointerId;
      joystickDragStartX = ev.clientX;
      joystickDragStartY = ev.clientY;
      joystickStartLeft = left;
      joystickStartTop = top;
      ev.preventDefault();
      ev.stopPropagation();
      if (target && typeof target.setPointerCapture === 'function') {
        try { target.setPointerCapture(ev.pointerId); } catch (_) {}
      }
    }

    function moveJoystickDrag(ev) {
      if (joystickDragPointerId !== ev.pointerId) return;
      const dx = ev.clientX - joystickDragStartX;
      const dy = ev.clientY - joystickDragStartY;
      let left = joystickStartLeft + dx;
      let top = joystickStartTop + dy;

      // 手动横屏模式下，容器整体旋转了 90deg，需要把屏幕手势换算回容器坐标
      if (manualFullscreen) {
        left = joystickStartLeft + dy;
        top = joystickStartTop - dx;
      }

      applyJoystickPosition(left, top);
    }

    function stopJoystickDrag(ev) {
      if (ev && joystickDragPointerId !== null && ev.pointerId !== joystickDragPointerId) return;
      joystickDragPointerId = null;
    }

      } catch (e) {

    const HOLD_DURATION_MS = 8000;
    const HOLD_INTERVAL_MS = 180;
    const HOLD_MAX_INFLIGHT = 2;

    async function sendOnce(key) {
      const t0 = performance.now();
      try {
        const r = await fetch('/api/control', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key })
        });
        const text = await r.text();
        let j = {};
        try {
          j = JSON.parse(text || '{}');
        } catch (_) {
          j = { ok: false, error: 'invalid json', raw: text };
        }
        const cost = Math.round(performance.now() - t0);
        appendDebug(`[${key}] HTTP ${r.status} ${cost}ms -> ${JSON.stringify(j)}`);
        return j;
      } catch (e) {
        const cost = Math.round(performance.now() - t0);
        const msg = e?.message || String(e);
        appendDebug(`[${key}] NETWORK ${cost}ms -> ${msg}`);
        throw e;
      }
    }

    async function sendHoldOneSecond(key) {
      const deadline = Date.now() + HOLD_DURATION_MS;
      let inflight = 0;
      let sent = 0;
      let done = false;
      let firstError = null;

      return await new Promise((resolve) => {
        const pump = () => {
          if (done) return;

          while (Date.now() < deadline && inflight < HOLD_MAX_INFLIGHT && !firstError) {
            inflight += 1;
            sent += 1;
            sendOnce(key)
              .then((j) => {
                if (!j?.ok && !firstError) firstError = j;
              })
              .catch((e) => {
                if (!firstError) firstError = { ok: false, error: e?.message || String(e) };
              })
              .finally(() => {
                inflight -= 1;
                if (done) return;
                if (firstError && inflight === 0) {
                  done = true;
                  resolve(firstError);
                  return;
                }
                if (Date.now() >= deadline && inflight === 0) {
                  done = true;
                  appendDebug(`[${key}] HOLD done, sent=${sent}`);
                  resolve({ ok: true, key, sent });
                }
              });
          }

          if (Date.now() >= deadline && inflight === 0) {
            done = true;
            appendDebug(`[${key}] HOLD done, sent=${sent}`);
            resolve({ ok: true, key, sent });
            return;
          }

          if (!done) setTimeout(pump, HOLD_INTERVAL_MS);
        };

        pump();
      });
    }

    async function sendPresetBurst(key) {
      let last = null;
      for (let i = 0; i < PRESET_BURST_COUNT; i += 1) {
        last = await sendOnce(key);
        if (!last?.ok) return last;
        if (i < PRESET_BURST_COUNT - 1) {
          await new Promise(resolve => setTimeout(resolve, PRESET_BURST_INTERVAL_MS));
        }
      }
      appendDebug(`[${key}] BURST done, sent=${PRESET_BURST_COUNT}`);
      return last || { ok: true };
    }

    async function sendReliable(key, count = RELIABLE_SEND_COUNT, intervalMs = RELIABLE_SEND_INTERVAL_MS) {
      let last = null;
      for (let i = 0; i < count; i += 1) {
        last = await sendOnce(key);
        if (!last?.ok) return last;
        if (i < count - 1) {
          await new Promise(resolve => setTimeout(resolve, intervalMs));
        }
      }
      appendDebug(`[${key}] RELIABLE done, sent=${count}`);
      return last || { ok: true, key };
    }

    async function activateBtn(key, persist = true) {
      if (!isPresetSlotKey(key)) return;
      applyUiState({ ...uiState, active_preset: String(key) });
      if (!persist) return;
      try {
        await saveSharedUiStatePatch({ active_preset: String(key) }, { silent: true });
      } catch (e) {

      }
    }

    function startUiStateSync() {
      if (uiStateSyncTimer) clearInterval(uiStateSyncTimer);
      uiStateSyncTimer = setInterval(() => {

    }
    async function send(key) {
      if (PRESET_BURST_KEYS.has(key)) setActivePresetButton(key);
      statusEl.textContent = t('sending') + key + '...';
      try {
        let j = null;
        if (key === 'preset') {
          j = await sendReliable('preset');
          if (j?.ok) {
            armPresetCapture();
            return;
          }
        } else if (presetArmActive && isPresetSlotKey(key)) {
          j = await sendReliable(key);
          if (j?.ok) {
            await activateBtn(key);
            disarmPresetCapture(`\u5df2\u5c06\u5f53\u524d\u753b\u9762\u4fdd\u5b58\u5230\u9884\u7f6e\u4f4d ${key}`);
            return;
          }
          disarmPresetCapture();
        } else {
          j = await sendReliable(key);
          if (j?.ok) {
            statusEl.textContent = t('success') + key;
            await activateBtn(key);
            return;
          }
        }

        if (j && j.error === 'missing config') statusEl.textContent = t('missCfg');
        else if (j) statusEl.textContent = t('failed') + JSON.stringify(j);
      } catch (e) {
        statusEl.textContent = t('error') + e.message;
      }
    }

    function isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }

    function syncLatencyRowPlacement() {
      if (!latencyRow || !videoShell || !latencyRowOriginalParent) return;
      const active = manualFullscreen || isFullscreen();
      videoShell.classList.toggle('fullscreen-active', active);
      if (active) {
        if (latencyRow.parentNode !== videoShell) {
          videoShell.appendChild(latencyRow);
        }
        return;
      }
      if (latencyRow.parentNode === latencyRowOriginalParent) return;
      if (latencyRowOriginalNextSibling && latencyRowOriginalNextSibling.parentNode === latencyRowOriginalParent) {
        latencyRowOriginalParent.insertBefore(latencyRow, latencyRowOriginalNextSibling);
      } else {
        latencyRowOriginalParent.appendChild(latencyRow);
      }
    }

    async function lockLandscape() {
      if (!screen.orientation || !screen.orientation.lock) return false;
      try {
        await screen.orientation.lock('landscape');
        return true;
      } catch (_) {
        return false;
      }
    }

    async function unlockLandscape() {
      if (!screen.orientation || !screen.orientation.unlock) return;
      try { screen.orientation.unlock(); } catch (_) {}
    }

    function enterManualFullscreen() {
      manualFullscreen = true;
      document.body.classList.add('rotate-fullscreen');
      videoShell.classList.add('manual-landscape');
      if (rotateBackdrop) rotateBackdrop.classList.add('show');
      padVisible = true;
      padOverlay.classList.add('show');
      if (padBtn) {
        padBtn.textContent = '隐藏摇杆';
        padBtn.setAttribute('aria-label', '隐藏摇杆');
        padBtn.title = '隐藏摇杆';
      }
      updateFullscreenUi();
      requestAnimationFrame(resetJoystickPosition);
    }

    function exitManualFullscreen() {
      manualFullscreen = false;
      document.body.classList.remove('rotate-fullscreen');
      videoShell.classList.remove('manual-landscape');
      if (rotateBackdrop) rotateBackdrop.classList.remove('show');
      padVisible = false;
      padOverlay.classList.remove('show');
      if (padBtn) {
        padBtn.textContent = '显示摇杆';
        padBtn.setAttribute('aria-label', '显示摇杆');
        padBtn.title = '显示摇杆';
      }
      updateFullscreenUi();
    }

    async function exitFullscreenMode() {
      exitManualFullscreen();
      await unlockLandscape();
      if (document.exitFullscreen && document.fullscreenElement) {
        await document.exitFullscreen();
      } else if (document.webkitExitFullscreen && document.webkitFullscreenElement) {
        document.webkitExitFullscreen();
      }
    }

    function updateFullscreenUi() {
      if (!fsBtn) return;
      const active = manualFullscreen || isFullscreen();
      syncLatencyRowPlacement();
      fsBtn.textContent = active ? '✕' : '⛶';
      fsBtn.setAttribute('aria-label', active ? '退出全屏' : '旋转全屏');
      fsBtn.title = active ? '退出全屏' : '旋转全屏';
      if (padBtn) {
        padBtn.style.display = active ? 'inline-flex' : 'none';
      }
    }

    async function toggleFullscreen(ev) {
      if (ev) {
        ev.preventDefault();
        ev.stopPropagation();
      }
      if (manualFullscreen || isFullscreen()) {
        await exitFullscreenMode();
        return;
      }

      const isMobile = window.matchMedia('(max-width: 900px)').matches;
      if (IS_WECHAT || IS_IOS) {
        enterManualFullscreen();
        await lockLandscape();
        return;
      }

      try {
        if (videoShell.requestFullscreen) await videoShell.requestFullscreen();
        else if (videoShell.webkitRequestFullscreen) videoShell.webkitRequestFullscreen();
        const locked = await lockLandscape();
        if (!locked && isMobile) enterManualFullscreen();
      } catch (_) {
        enterManualFullscreen();
        await lockLandscape();
      }
    }

    function togglePad() {
      if (!(manualFullscreen || isFullscreen())) return;
      ignoreClickUntil = Date.now() + 300;
      padVisible = !padVisible;
      if (padVisible) {
        padOverlay.classList.add('show');
        requestAnimationFrame(resetJoystickPosition);
      } else {
        padOverlay.classList.remove('show');
      }
      if (padBtn) {
        padBtn.textContent = padVisible ? '隐藏摇杆' : '显示摇杆';
        padBtn.setAttribute('aria-label', padVisible ? '隐藏摇杆' : '显示摇杆');
        padBtn.title = padVisible ? '隐藏摇杆' : '显示摇杆';
      }
    }

    function handleVideoShellClick(ev) {
      if (Date.now() < ignoreClickUntil) return;
      const t = ev.target;
      if (!t) return;
      if (t.closest('button') || t.closest('.video-toolbar') || t.closest('.fs-overlay') || t.closest('.stream-bar')) return;
      toggleFullscreen();
    }

    videoShell.addEventListener('click', handleVideoShellClick);
    if (rotateBackdrop) rotateBackdrop.addEventListener('click', () => { exitFullscreenMode(); });
    document.addEventListener('fullscreenchange', () => {
      if (isFullscreen()) {
        padVisible = true;
        padOverlay.classList.add('show');
        requestAnimationFrame(resetJoystickPosition);
        if (padBtn) {
          padBtn.textContent = '隐藏摇杆';
          padBtn.setAttribute('aria-label', '隐藏摇杆');
          padBtn.title = '隐藏摇杆';
        }
      } else {
        unlockLandscape();
        padVisible = false;
        padOverlay.classList.remove('show');
        if (padBtn) {
          padBtn.textContent = '显示摇杆';
          padBtn.setAttribute('aria-label', '显示摇杆');
          padBtn.title = '显示摇杆';
        }
      }
      updateFullscreenUi();
    });
    document.addEventListener('webkitfullscreenchange', () => {
      if (isFullscreen()) {
        padVisible = true;
        padOverlay.classList.add('show');
        requestAnimationFrame(resetJoystickPosition);
        if (padBtn) {
          padBtn.textContent = '隐藏摇杆';
          padBtn.setAttribute('aria-label', '隐藏摇杆');
          padBtn.title = '隐藏摇杆';
        }
      } else {
        unlockLandscape();
        padVisible = false;
        padOverlay.classList.remove('show');
        if (padBtn) {
          padBtn.textContent = '显示摇杆';
          padBtn.setAttribute('aria-label', '显示摇杆');
          padBtn.title = '显示摇杆';
        }
      }
      updateFullscreenUi();
    });
    const video = document.getElementById('v');
    video.muted = true;
    video.autoplay = true;
    video.playsInline = true;

    video.addEventListener('click', () => tryPlay(video), { passive: true });
    video.addEventListener('loadedmetadata', () => tryPlay(video, true));
    video.addEventListener('canplay', () => tryPlay(video, true));
    video.addEventListener('stalled', () => tryPlay(video, true));
    video.addEventListener('waiting', () => tryPlay(video, true));

    window.addEventListener('beforeunload', () => {
      stopWebRtcReader();
      if (webrtcEnsureTimer) clearInterval(webrtcEnsureTimer);
      if (uiStateSyncTimer) clearInterval(uiStateSyncTimer);
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        tryPlay(video);
        if (isCurrentWebRtcMode() && !webrtcHasTrack) startAutoWebRtcBootstrap();
        fetchSharedUiState(true);
      }
    });

    // WeChat privileged event: improves autoplay/WebRTC startup success without manual taps.
    document.addEventListener('WeixinJSBridgeReady', () => {
      try { WeixinJSBridge.invoke('getNetworkType', {}, () => {}); } catch (_) {}
      if (isCurrentWebRtcMode() && !webrtcHasTrack) {
        startAutoWebRtcBootstrap();
      }
    });

    bindIosStartButton();
    setupIosPlaybackNudge();
    initUiState();
    bindZoomHoldButtons();
    {
      const joyCenterDrag = document.getElementById('joyCenterDrag');
      if (joyCenterDrag) {
        joyCenterDrag.addEventListener('pointerdown', startJoystickDrag);
        joyCenterDrag.addEventListener('pointermove', moveJoystickDrag);
        joyCenterDrag.addEventListener('pointerup', stopJoystickDrag);
        joyCenterDrag.addEventListener('pointercancel', stopJoystickDrag);
        joyCenterDrag.addEventListener('click', (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
        });
      }
    }
    window.addEventListener('resize', () => {
      if (padVisible) requestAnimationFrame(resetJoystickPosition);
    });
    setVideoStatus('');
    autoStartVideo();
    applyUiState(uiState);
    bindPresetLabelHoldButtons();
    fetchSharedUiState(true);
    startUiStateSync();
    startAutoWebRtcBootstrap();
    startStreamHealthMonitor();
    startPlaybackGuard();
    startLatencyProbe();
    setInterval(syncLatencyDigitalFromBadge, 500);
    updateFullscreenUi();
    if (presetEditCancel) {
      presetEditCancel.addEventListener('click', () => closePresetEditModal(null));
    }
    if (presetEditConfirm) {
      presetEditConfirm.addEventListener('click', () => closePresetEditModal(presetEditInput ? presetEditInput.value : ''));
    }
    if (presetEditModal) {
      presetEditModal.addEventListener('click', (ev) => {
        if (ev.target === presetEditModal) closePresetEditModal(null);
      });
    }
    if (presetEditInput) {
      presetEditInput.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') {
          ev.preventDefault();
          closePresetEditModal(presetEditInput.value);
        } else if (ev.key === 'Escape') {
          ev.preventDefault();
          closePresetEditModal(null);
        }
      });
    }
  </script>


</body>
