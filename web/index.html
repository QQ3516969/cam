  <style>
    :root {
      --bg: #0b0d12;
      --panel: #151922;
      --panel-border: #2b3342;

      --ok: #2ea55f;
      --ok-border: #46bf79;
      --shadow: 0 8px 24px rgba(0,0,0,0.35);

    * { box-sizing: border-box; }
    body { margin:0; background: #0f131a; color:#f2f5ff; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif; }
    .wrap { max-width:980px; margin:0 auto; padding:10px; padding-bottom:64px; }
    .card { background:var(--panel); border:1px solid var(--panel-border); border-radius:14px; padding:8px; margin-bottom:8px; }
    .video-card { overflow:hidden; }

    video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; background:#000; -webkit-user-select:none; user-select:none; touch-action:manipulation; border-radius:inherit; clip-path:inset(0 round 14px); }
    .webrtc-frame { position:absolute; inset:0; width:100%; height:100%; border:0; background:#000; display:none; z-index:25; pointer-events:none; border-radius:inherit; clip-path:inset(0 round 14px); }
    video::-webkit-media-controls { display:none !important; }
    video::-webkit-media-controls-enclosure { display:none !important; }
    .live-badge { position:absolute; right:8px; bottom:8px; height:20px; line-height:20px; padding:0 7px; border-radius:999px; font-size:10px; color:#fff; background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.20); letter-spacing:0.2px; z-index:30; display:flex; align-items:center; gap:5px; }
    #liveText { display:none; }
    .live-dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
    .live-ok { background:#2ecc71; box-shadow:0 0 0 2px rgba(46,204,113,0.2); }
    .live-warn { background:#f1c40f; box-shadow:0 0 0 2px rgba(241,196,15,0.2); }
    .live-bad { background:#ff4d4f; box-shadow:0 0 0 2px rgba(255,77,79,0.2); }
    .video-toolbar { position:absolute; top:8px; right:8px; z-index:31; display:none; gap:6px; }
    .apple-btn { border:1px solid var(--btn-border); background:var(--btn); color:var(--btn-text); border-radius:10px; transition: background-color .08s ease, border-color .08s ease; font-weight:600; }
    .apple-btn:active { transform:none; background: #3a475e; border-color:#567099; }
    .tiny { height:28px; padding:0 8px; font-size:11px; border-radius:9px; }
    .status { min-height:18px; margin-top:8px; font-size:12px; color:#a7c5ff; letter-spacing:.1px; }
    .video-status { min-height:0; margin-top:0; }
    .controls-layout { display:grid; grid-template-columns:1.1fr 0.9fr; gap:8px; align-items:start; }
    .dpad { display:grid; grid-template-columns:repeat(3, 1fr); grid-template-rows:repeat(3, 38px); gap:6px; }
    .blank { opacity:0; pointer-events:none; }
    .ctl-btn { height:38px; font-size:13px; border-radius:10px; }

    .preset-btn:active { opacity:.92; }
    .preset-btn.is-active { opacity:1; background:linear-gradient(180deg, #f3e7a6, #dccb7a); border-color:#f6e7a8; color:#3a3320; box-shadow:0 0 0 1px rgba(255,245,186,0.45) inset; }
    .btn-active { opacity:1 !important; background: linear-gradient(180deg, #f3e7a6, #dccb7a) !important; border-color:#f6e7a8 !important; color:#3a3320 !important; box-shadow:0 0 0 1px rgba(255,245,186,0.45) inset !important; }
    .ok-btn { background:var(--ok); border-color:var(--ok-border); color:#f8fffb; font-weight:700; }

    .dir-btn:active { background:#343d4b; border-color:#4d5a70; color:#eef2fa; }
    .joy-up, .joy-down, .joy-left, .joy-right { background:#2b5fd9; border-color:#4b7df2; }
    .joy-up:active, .joy-down:active, .joy-left:active, .joy-right:active { background:#4a79ea; border-color:#7aa0ff; }
    .ctl-btn:active { transform:none; background: linear-gradient(180deg, rgba(96,132,190,0.95), rgba(74,106,165,0.95)); border-color: rgba(194,222,255,0.58); color:#ffffff; }
    .ctl-btn.dir-btn:active { background:#343d4b; border-color:#4d5a70; color:#eef2fa; }
    .ok-btn:active { transform:none; background: linear-gradient(180deg, #2fbe66, #269d55); border-color: rgba(132,255,178,0.68); color:#ffffff; }
    .joy-center:active { transform: translate(-50%,-50%) !important; background:#259653; border-color:#46bf79; }
    .func-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; }
    .fs-overlay { position:absolute; left:0; right:0; bottom:max(8px, env(safe-area-inset-bottom)); display:none; z-index:40; padding:0 8px; pointer-events:none; }
    .fs-overlay.show { display:block; }
    .joy-wrap { width:min(420px, 90vw); margin: 8px auto 0; pointer-events:auto; }
    .joy-stack { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .joystick { position:relative; width:min(190px, 46vw); height:min(190px, 46vw); margin:0 auto; border-radius:50%; background:#1a202b; border:1px solid #3a4558; }
    .joy-btn { position:absolute; width:46px; height:46px; border-radius:50%; font-size:12px; border:1px solid #4a556b; background:#232b39; color:#fff; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
    .joy-btn:active { background:#415273; border-color:#6f87b8; }
    .joy-up { left:50%; top:10px; transform:translateX(-50%); }
    .joy-down { left:50%; bottom:10px; transform:translateX(-50%); }
    .joy-left { left:10px; top:50%; transform:translateY(-50%); }
    .joy-right { right:10px; top:50%; transform:translateY(-50%); }
    .joy-center { left:50%; top:50%; transform:translate(-50%,-50%); width:56px; height:56px; background:var(--ok); border-color:var(--ok-border); font-weight:700; margin:0; }
    .joy-zoom-plus { left:40px; bottom:22px; transform:none; width:30px; height:20px; border-radius:10px; font-size:10px; }
    .joy-zoom-minus { right:40px; bottom:22px; transform:none; width:30px; height:20px; border-radius:10px; font-size:10px; }
            .digital-status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 8px 16px;
      background: #0a0a0a;
      border-top: 1px solid #1a1a1a;

      height: 10px;

  .stream-bar { display:none !important; }
    .stream-bar select { height:30px; border-radius:8px; border:1px solid #3b4558; background:#111722; color:#dde7ff; padding:0 7px; font-size:10px; }

    .start-btn { display:none !important; }
    .video-shell:fullscreen .fs-overlay.show, .video-shell:-webkit-full-screen .fs-overlay.show { display:block; }
    .video-shell:fullscreen, .video-shell:-webkit-full-screen { width:100vw; height:100vh; border-radius:0; border:none; }
    .video-shell:fullscreen video, .video-shell:-webkit-full-screen video { width:100%; height:100%; object-fit:cover; }

    @media (max-width:760px) {

    }

        error: '\u9519\u8BEF\uFF1A',
        missCfg: '\u63A7\u5236\u63A5\u53E3\u672A\u914D\u7F6E\uFF1A\u8BF7\u586B\u5199TUYA_CLIENT_ID / TUYA_CLIENT_SECRET / TUYA_DEVICE_ID / TUYA_REMOTE_ID',
        pad: '\u6447\u6746',
        hidePad: '\u9690\u85CF\u6447\u6746'
      };
      return map[s] || s;
    }

    function isHlsPlayableUrl(url) { return url.endsWith('.m3u8') || url.includes(':8888/cam/'); }
    function isWebRtcPlayableUrl(url) {
      const u = String(url || '');
      return (u.includes(':8889/cam/') || u.startsWith('/cam/?') || u.startsWith('/cam/whep')) && !u.includes('.m3u8');
    }
    function normalizeToM3u8(url) {
      if (url.endsWith('.m3u8')) return url;
      if (url.includes(':8888/cam/')) return 'http://ddns.c6666.com:8888/cam/index.m3u8';
      return url;
    }
    function normalizeToWebRtcPage(url) {
      if (!isWebRtcPlayableUrl(url)) return url;
      const base = url.split('?')[0].replace(/\/$/, '') + '/';
      return base + '?controls=0&muted=1&autoplay=1&playsinline=1';
    }
    function isCurrentWebRtcMode() {
      return isWebRtcPlayableUrl(currentStreamUrl || '');
    }

    function stopWebRtcReader() {
      if (webrtcRetryTimer) {
        clearTimeout(webrtcRetryTimer);
        webrtcRetryTimer = null;
      }
      if (webrtcStartWatchdog) {
        clearTimeout(webrtcStartWatchdog);
        webrtcStartWatchdog = null;
      }
      webrtcStartInProgress = false;
      if (webrtcReader) {
        try { webrtcReader.close(); } catch (_) {}
        webrtcReader = null;
      }
    }

    function scheduleWebRtcRetry() {
      if (!isCurrentWebRtcMode()) return;
      if (webrtcRetryTimer) return;
      const delay = webrtcUserActivated ? 900 : Math.min(8000, 1200 + webrtcRetryCount * 800);
      webrtcRetryCount += 1;
      appendDebug(`[webrtc] retry in ${delay}ms (#${webrtcRetryCount})`);
      webrtcRetryTimer = setTimeout(() => {
        webrtcRetryTimer = null;
        startWebRtcReader();
      }, delay);
    }

    function startWebRtcReader() {
      if (!isCurrentWebRtcMode()) return;
      if (webrtcStartInProgress) return;

      stopWebRtcReader();
      webrtcStartInProgress = true;
      webrtcHasTrack = false;

      const video = document.getElementById('v');
      if (!video) { webrtcStartInProgress = false; return; }

      video.muted = true;
      video.autoplay = true;
      video.playsInline = true;

      const whep = `${window.location.origin}/cam/whep`;
      try {
        webrtcReader = new MediaMTXWebRTCReader({
          url: whep,
          onError: (err) => {
            webrtcStartInProgress = false;
            appendDebug(`[webrtc] error: ${err}`);
            setLiveState('bad', '重连中');
            if (latencyText) latencyText.textContent = '--ms';
        if (digitalDot) digitalDot.className = 'digital-dot live-bad';
        if (digitalLatency) digitalLatency.textContent = '----ms';
        if (digitalTime) digitalTime.textContent = '--:--:--';
      if (latencyDigital) latencyDigital.textContent = '--.--';
            scheduleWebRtcRetry();
          },
          onTrack: (evt) => {
            webrtcStartInProgress = false;
            webrtcHasTrack = true;
            webrtcRetryCount = 0;
            video.srcObject = evt.streams[0];
            const playPromise = video.play();
            if (playPromise && typeof playPromise.catch === 'function') {
              playPromise.then(() => {
                              }).catch(() => {
                              });
            }
            setLiveState('ok', 'WebRTC');
            setVideoStatus('');
          },
        });

        webrtcStartWatchdog = setTimeout(() => {
          webrtcStartWatchdog = null;
          if (!webrtcHasTrack && isCurrentWebRtcMode()) {
            webrtcStartInProgress = false;
            appendDebug('[webrtc] watchdog timeout, restart');
            try { if (webrtcReader) webrtcReader.close(); } catch (_) {}
            webrtcReader = null;
            scheduleWebRtcRetry();
          }
        }, webrtcUserActivated ? 2600 : 4200);
      } catch (e) {
        webrtcStartInProgress = false;
        appendDebug(`[webrtc] init fail: ${e?.message || e}`);
        scheduleWebRtcRetry();
      }
    }

    function keepPlaying(video) {
      video.addEventListener('pause', () => { if (!video.ended) tryPlay(video); });
    }

    function tryPlay(video, fromAuto = false) {
      const p = video.play();
      if (p && typeof p.catch === 'function') {
        p.catch(() => {
          if (fromAuto) {
          }
        });
      }
    }

    function getDefaultPlayableStream() {
      return FIXED_STREAM_URL;
    }

    function syncPresetToCurrent(url) {
      const opts = Array.from(streamPreset.options || []);
      const hit = opts.find(o => normalizeToM3u8(o.value) === url || normalizeToWebRtcPage(o.value) === url);
      if (hit) streamPreset.value = hit.value;
    }

    async function probeLatencyMs() {
      const t0 = performance.now();
      const probeUrl = isCurrentWebRtcMode() ? `${window.location.origin}/cam/` : 'http://ddns.c6666.com:8888/cam/index.m3u8';
      try {
        await fetch(probeUrl, { mode: 'no-cors', cache: 'no-store' });
        return Math.round(performance.now() - t0);
      } catch (_) {
        return -1;
      }
    }


    function syncLatencyDigitalFromBadge() {
      if (!latencyDigital || !latencyText) return;
      const raw = (latencyText.textContent || '').trim();
      const m = raw.match(/(\d+(?:\.\d+)?)/);
      latencyDigital.textContent = m ? m[1] : '--.--';
    }

function updateDigitalStatus(ms) {
  if (!digitalDot || !digitalTime || !digitalLatency) return;
  if (ms >= 0) {
    digitalDot.className = 'digital-dot live-ok';
    digitalLatency.textContent = String(ms).padStart(4, ' ') + 'ms';
  } else {
    digitalDot.className = 'digital-dot live-bad';
    digitalLatency.textContent = '----ms';
  }
  var d = new Date();
  var h = String(d.getHours()).padStart(2, '0');
  var m = String(d.getMinutes()).padStart(2, '0');
  var s = String(d.getSeconds()).padStart(2, '0');
  digitalTime.textContent = h + ':' + m + ':' + s;
}

    function startLatencyProbe() {
      const tick = async () => {
        const ms = await probeLatencyMs();
        if (latencyText) latencyText.textContent = (liveDot && liveDot.classList.contains('live-ok') && ms >= 0) ? `${ms}ms` : '--ms';
        if (latencyDigital) latencyDigital.textContent = (ms >= 0) ? `${ms}` : '--.--';
        syncLatencyDigitalFromBadge();
        updateDigitalStatus(ms);
      };
      tick();
      setInterval(tick, 3000);
    }

    function autoStartVideo() {
      currentStreamUrl = getDefaultPlayableStream();
      syncPresetToCurrent(currentStreamUrl);
      autoStartRetries = 0;
      loadVideo(currentStreamUrl);

      const video = document.getElementById('v');
      const timer = setInterval(() => {
        autoStartRetries += 1;
        if (isCurrentWebRtcMode()) {
          clearInterval(timer);
          return;
        }
        const playing = video.readyState >= 2 && !video.paused;
        if (playing) {
          clearInterval(timer);
          return;
        }
        if (autoStartRetries >= MAX_AUTOSTART_RETRIES) {
          clearInterval(timer);
          if (video.paused) {
            setVideoStatus('自动起播耗时较长，仍在后台保活重试');
          }
          return;
        }
        loadVideo(currentStreamUrl);
      }, 1500);
    }

    function setLiveState(level, text) {
      liveText.textContent = text;
      liveDot.classList.remove('live-ok', 'live-warn', 'live-bad');
      if (level === 'ok') liveDot.classList.add('live-ok');
      else if (level === 'warn') liveDot.classList.add('live-warn');
      else liveDot.classList.add('live-bad');
    }

    function startStreamHealthMonitor() {
      const video = document.getElementById('v');
      if (streamHealthTimer) clearInterval(streamHealthTimer);
      lastVideoTime = -1;
      stillCount = 0;
      setLiveState('bad', '检测中');
      if (latencyText) latencyText.textContent = '--ms';
        if (digitalDot) digitalDot.className = 'digital-dot live-bad';
        if (digitalLatency) digitalLatency.textContent = '----ms';
        if (digitalTime) digitalTime.textContent = '--:--:--';
      if (latencyDigital) latencyDigital.textContent = '--.--';

      streamHealthTimer = setInterval(() => {
        if (isCurrentWebRtcMode()) {
          setLiveState('ok', 'WebRTC');
          return;
        }
        if (!video.src && !video.currentSrc) {
          setLiveState('bad', '未加载');
          return;
        }
        if (video.readyState < 2) {
          setLiveState('bad', '缓冲中');
          return;
        }

        const t = Number(video.currentTime || 0);
        if (lastVideoTime < 0) {
          lastVideoTime = t;
          setLiveState('warn', '预热中');
          return;
        }

        const dt = t - lastVideoTime;
        lastVideoTime = t;

        if (dt > 0.02) {
          stillCount = 0;
          setLiveState('ok', '实时');
          return;
        }

        stillCount += 1;
        if (stillCount >= 6) {
          setLiveState('warn', '疑似静止');
        }
      }, 1000);
    }

    function startPlaybackGuard() {
      const video = document.getElementById('v');
      if (playbackGuardTimer) clearInterval(playbackGuardTimer);

      playbackGuardTimer = setInterval(() => {
        if (isCurrentWebRtcMode()) {
          const v = document.getElementById('v');
          if (v && v.paused) {
            const p = v.play();
            if (p && typeof p.catch === 'function') {
              p.catch(() => {});
            }
          }
          if (!webrtcHasTrack && webrtcUserActivated) {
            scheduleWebRtcRetry();
          }
          return;
        }
        const noSource = !video.currentSrc && !video.src;
        const stalled = video.readyState < 2 || video.paused;

        if (noSource) {
          noSourceReloadCount += 1;
          if (noSourceReloadCount >= 3) {
            if (!currentStreamUrl) {
              currentStreamUrl = getDefaultPlayableStream();
              syncPresetToCurrent(currentStreamUrl);
            }
            loadVideo(currentStreamUrl);
            noSourceReloadCount = 0;
          }
          return;
        }

        noSourceReloadCount = 0;

        if (stalled) {
          tryPlay(video, true);
          return;
        }

        const t = Number(video.currentTime || 0);
        if (lastVideoTime >= 0 && (t - lastVideoTime) <= 0.001) {
          tryPlay(video, true);
        }
      }, 3000);
    }

    function loadVideo(url) {
      const video = document.getElementById('v');
      keepPlaying(video);
      const target = url || currentStreamUrl;
      if (!target) { setVideoStatus(t('noStream')); return; }

      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      video.pause();
      video.removeAttribute('src');
      video.load();

      if (isWebRtcPlayableUrl(target)) {
        currentStreamUrl = FIXED_WEBRTC_URL;
        webrtcHasTrack = false;
        if (webrtcFrame) {
          webrtcFrame.style.display = 'none';
          webrtcFrame.style.pointerEvents = 'none';
          webrtcFrame.src = 'about:blank';
        }
        video.style.display = 'block';
        setVideoStatus('正在连接 WebRTC...');
        startWebRtcReader();
        return;
      }

      stopWebRtcReader();
      if (webrtcFrame) {
        webrtcFrame.style.display = 'none';
        webrtcFrame.style.pointerEvents = 'none';
        webrtcFrame.src = 'about:blank';
      }
            video.style.display = 'block';

      if (!isHlsPlayableUrl(target)) {
        setVideoStatus('');
        return;
      }

      const playUrl = normalizeToM3u8(target);
      currentStreamUrl = playUrl;

      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = playUrl;
        tryPlay(video, true);
        setVideoStatus(t('loadedNative'));
        return;
      }

      if (window.Hls && Hls.isSupported()) {
        hlsInstance = new Hls({ lowLatencyMode: true });
        hlsInstance.loadSource(playUrl);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
          tryPlay(video, true);
          setVideoStatus(t('loadedHlsJs'));
        });
        hlsInstance.on(Hls.Events.ERROR, (_, data) => {
          setVideoStatus(t('videoErr') + data.type + ' / ' + data.details);
        });
      } else {
        setVideoStatus(t('hlsUnsupported'));
      }
    }

    function applyStream() {
      currentStreamUrl = FIXED_STREAM_URL;
      loadVideo(currentStreamUrl);
    }
    function openStream() { window.open('/cam/', '_blank'); }

    function nowStamp() {
      return new Date().toLocaleTimeString();
    }

    function appendDebug(line) {
      if (!debugLog) return;
      const prev = debugLog.textContent || '';
      const next = `${nowStamp()} ${line}`;
      const merged = prev ? `${prev}\n${next}` : next;
      const lines = merged.split('\n');
      debugLog.textContent = lines.slice(-120).join('\n');
      if (debugVisible && debugPanel) debugPanel.scrollTop = debugPanel.scrollHeight;
    }

    function clearDebug() {
      if (debugLog) debugLog.textContent = '调试日志已清空';
    }

    function toggleDebug() {
      debugVisible = !debugVisible;
      if (!debugPanel || !debugToggleBtn) return;
      if (debugVisible) {
        debugPanel.classList.remove('hide');
        debugToggleBtn.textContent = '隐藏调试';
      } else {
        debugPanel.classList.add('hide');
        debugToggleBtn.textContent = '显示调试';
      }
    }

    function initUiState() {
      if (debugPanel) debugPanel.classList.add('hide');
      if (debugToggleBtn) debugToggleBtn.textContent = '显示调试';
    }

    async function warmupPlayback() {
      const video = document.getElementById('v');
      if (!video) return;
      video.muted = true;
      video.autoplay = true;
      video.playsInline = true;
      try { await video.play(); } catch (_) {}
    }


    function bindIosStartButton() {}

    function setupIosPlaybackNudge() {
      if (!(IS_IOS || IS_WECHAT)) return;
      const oneTouch = async () => {
        webrtcUserActivated = true;
        await warmupPlayback();
        if (isCurrentWebRtcMode() && !webrtcHasTrack) startAutoWebRtcBootstrap();
      };
      document.addEventListener('touchstart', oneTouch, { passive: true, once: true });

      setTimeout(() => {
        if (isCurrentWebRtcMode() && !webrtcHasTrack) startAutoWebRtcBootstrap();
      }, 1200);

      setInterval(() => {
        if (document.hidden) return;
        if (isCurrentWebRtcMode() && !webrtcHasTrack) startAutoWebRtcBootstrap();
      }, 1800);
    }

    function startAutoWebRtcBootstrap() {
      if (!isCurrentWebRtcMode()) return;
      webrtcUserActivated = true;
      warmupPlayback();
      startWebRtcReader();

      if (webrtcEnsureTimer) clearInterval(webrtcEnsureTimer);
      webrtcEnsureTimer = setInterval(() => {
        if (!isCurrentWebRtcMode()) return;
        if (webrtcHasTrack) {
          clearInterval(webrtcEnsureTimer);
          webrtcEnsureTimer = null;
          return;
        }
        startWebRtcReader();
      }, 1200);
    }

    const HOLD_KEYS = new Set(['down', 'right']);
    const PRESET_BURST_KEYS = new Set(['preset1', 'preset2', 'preset3', 'preset4']);
    const PRESET_BURST_COUNT = 5;
    const PRESET_BURST_INTERVAL_MS = 120;

    function setActivePresetButton(key) {
      const presetBtns = document.querySelectorAll('.preset-btn');
      presetBtns.forEach((btn) => {
        const isTarget = btn.getAttribute('onclick') === `send('${key}')`;
        btn.classList.toggle('is-active', isTarget);
      });
    }
    const HOLD_DURATION_MS = 8000;
    const HOLD_INTERVAL_MS = 180;
    const HOLD_MAX_INFLIGHT = 2;

    async function sendOnce(key) {
      const t0 = performance.now();
      try {
        const r = await fetch('/api/control', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key })
        });
        const text = await r.text();
        let j = {};
        try {
          j = JSON.parse(text || '{}');
        } catch (_) {
          j = { ok: false, error: 'invalid json', raw: text };
        }
        const cost = Math.round(performance.now() - t0);
        appendDebug(`[${key}] HTTP ${r.status} ${cost}ms -> ${JSON.stringify(j)}`);
        return j;
      } catch (e) {
        const cost = Math.round(performance.now() - t0);
        const msg = e?.message || String(e);
        appendDebug(`[${key}] NETWORK ${cost}ms -> ${msg}`);
        throw e;
      }
    }

    async function sendHoldOneSecond(key) {
      const deadline = Date.now() + HOLD_DURATION_MS;
      let inflight = 0;
      let sent = 0;
      let done = false;
      let firstError = null;

      return await new Promise((resolve) => {
        const pump = () => {
          if (done) return;

          while (Date.now() < deadline && inflight < HOLD_MAX_INFLIGHT && !firstError) {
            inflight += 1;
            sent += 1;
            sendOnce(key)
              .then((j) => {
                if (!j?.ok && !firstError) firstError = j;
              })
              .catch((e) => {
                if (!firstError) firstError = { ok: false, error: e?.message || String(e) };
              })
              .finally(() => {
                inflight -= 1;
                if (done) return;
                if (firstError && inflight === 0) {
                  done = true;
                  resolve(firstError);
                  return;
                }
                if (Date.now() >= deadline && inflight === 0) {
                  done = true;
                  appendDebug(`[${key}] HOLD done, sent=${sent}`);
                  resolve({ ok: true, key, sent });
                }
              });
          }

          if (Date.now() >= deadline && inflight === 0) {
            done = true;
            appendDebug(`[${key}] HOLD done, sent=${sent}`);
            resolve({ ok: true, key, sent });
            return;
          }

          if (!done) setTimeout(pump, HOLD_INTERVAL_MS);
        };

        pump();
      });
    }

    async function sendPresetBurst(key) {
      let last = null;
      for (let i = 0; i < PRESET_BURST_COUNT; i += 1) {
        last = await sendOnce(finalKey);
        if (!last?.ok) return last;
        if (i < PRESET_BURST_COUNT - 1) {
          await new Promise(resolve => setTimeout(resolve, PRESET_BURST_INTERVAL_MS));
        }
      }
      appendDebug(`[${key}] BURST done, sent=${PRESET_BURST_COUNT}`);
      return last || { ok: true };
    }

    function activateBtn(key) {
      // Skip direction buttons - they don't participate in active state
      if (['up','down','left','right'].indexOf(key) !== -1) return;
      // Remove active from all buttons first (mutual exclusion)
      document.querySelectorAll('.btn-active').forEach(function(b) {
        b.classList.remove('btn-active');
      });
      // Add active to clicked button
      document.querySelectorAll('button').forEach(function(b) {
        if (b.getAttribute('onclick') === "send('" + key + "')") {
          b.classList.add('btn-active');
        }
      });
      // Save single key to localStorage
      localStorage.setItem('cam-active-btn', key);
    }
    function restoreActiveBtns() {
      // Remove all active first
      document.querySelectorAll('.btn-active').forEach(function(b) {
        b.classList.remove('btn-active');
      });
      // Restore single active button
      var key = localStorage.getItem('cam-active-btn');
      if (key) {
        document.querySelectorAll('button').forEach(function(b) {
          if (b.getAttribute('onclick') === "send('" + key + "')") {
            b.classList.add('btn-active');
          }
        });
      }
    }
    async function send(key) {
      activateBtn(key);
      if (PRESET_BURST_KEYS.has(key)) setActivePresetButton(key);
      statusEl.textContent = t('sending') + key + '...';
      try {
        const finalKey = key;
        let j = null;
        for (let t = 0; t < 3; t++) {
          j = await sendOnce(finalKey);
          if (!j.ok) break;
          if (t < 2) await new Promise(r => setTimeout(r, 150));
        }
        if (j && j.ok) { statusEl.textContent = t('success') + finalKey; activateBtn(key); }
        else if (j && j.error === 'missing config') statusEl.textContent = t('missCfg');
        else if (j) statusEl.textContent = t('failed') + JSON.stringify(j);
      } catch (e) {
        statusEl.textContent = t('error') + e.message;
      }
    }

    function isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
    async function toggleFullscreen() {
      if (!isFullscreen()) {
        try {
          if (videoShell.requestFullscreen) await videoShell.requestFullscreen();
          else if (videoShell.webkitRequestFullscreen) videoShell.webkitRequestFullscreen();
        } catch (_) {}
      } else {
        if (document.exitFullscreen) await document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    }

    function togglePad() {
      ignoreClickUntil = Date.now() + 300;
      padVisible = !padVisible;
      if (padVisible) padOverlay.classList.add('show'); else padOverlay.classList.remove('show');
      padBtn.textContent = padVisible ? t('hidePad') : t('pad');
    }

    function handleVideoShellClick(ev) {
      if (Date.now() < ignoreClickUntil) return;
      const t = ev.target;
      if (!t) return;
      if (t.closest('button') || t.closest('.video-toolbar') || t.closest('.fs-overlay') || t.closest('.stream-bar')) return;
      toggleFullscreen();
    }

    videoShell.addEventListener('click', handleVideoShellClick);
    const video = document.getElementById('v');
    video.muted = true;
    video.autoplay = true;
    video.playsInline = true;

    video.addEventListener('click', () => tryPlay(video), { passive: true });
    video.addEventListener('loadedmetadata', () => tryPlay(video, true));
    video.addEventListener('canplay', () => tryPlay(video, true));
    video.addEventListener('stalled', () => tryPlay(video, true));
    video.addEventListener('waiting', () => tryPlay(video, true));

    window.addEventListener('beforeunload', () => {
      stopWebRtcReader();
      if (webrtcEnsureTimer) clearInterval(webrtcEnsureTimer);
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        tryPlay(video);
        if (isCurrentWebRtcMode() && !webrtcHasTrack) startAutoWebRtcBootstrap();
      }
    });

    // WeChat privileged event: improves autoplay/WebRTC startup success without manual taps.
    document.addEventListener('WeixinJSBridgeReady', () => {
      try { WeixinJSBridge.invoke('getNetworkType', {}, () => {}); } catch (_) {}
      if (isCurrentWebRtcMode() && !webrtcHasTrack) {
        startAutoWebRtcBootstrap();
      }
    });

    bindIosStartButton();
    setupIosPlaybackNudge();
    initUiState();
    setVideoStatus('');
    autoStartVideo();
    restoreActiveBtns();
    startAutoWebRtcBootstrap();
    startStreamHealthMonitor();
    startPlaybackGuard();
    startLatencyProbe();
    setInterval(syncLatencyDigitalFromBadge, 500);
  </script>
