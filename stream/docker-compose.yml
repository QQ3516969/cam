services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx-cam
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "8189:8189/tcp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  cam-publisher:
    image: lscr.io/linuxserver/ffmpeg:latest
    container_name: mediamtx-cam-publisher
    restart: unless-stopped
    depends_on:
      - mediamtx
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./restart.sh:/restart.sh:ro
    command: >
      sh /restart.sh


